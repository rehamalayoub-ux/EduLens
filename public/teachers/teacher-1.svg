<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#1e3f6e"/>
  <!-- Suit jacket -->
  <path d="M 20 200 C 20 162 55 152 100 156 C 145 152 180 162 180 200Z" fill="#12294a"/>
  <!-- Shirt collar left -->
  <path d="M 92 150 L 82 158 L 100 164 Z" fill="white"/>
  <!-- Shirt collar right -->
  <path d="M 108 150 L 118 158 L 100 164 Z" fill="white"/>
  <!-- Tie -->
  <path d="M 97 150 L 94 162 L 100 168 L 106 162 L 103 150 Q 100 154 97 150Z" fill="#c0392b"/>
  <!-- Neck -->
  <path d="M 87 128 Q 87 155 100 158 Q 113 155 113 128 Q 107 132 100 133 Q 93 132 87 128Z" fill="#c4855a"/>
  <!-- Head -->
  <ellipse cx="100" cy="100" rx="40" ry="45" fill="#c4855a"/>
  <!-- Hair top -->
  <path d="M 60 90 C 60 62 78 55 100 54 C 122 55 140 62 140 90 C 138 75 130 63 100 62 C 70 63 62 75 60 90Z" fill="#1a1010"/>
  <!-- Hair sides -->
  <path d="M 60 90 C 58 100 60 110 62 115 C 64 108 62 98 65 90Z" fill="#1a1010"/>
  <path d="M 140 90 C 142 100 140 110 138 115 C 136 108 138 98 135 90Z" fill="#1a1010"/>
  <!-- Left ear -->
  <ellipse cx="60" cy="108" rx="7" ry="10" fill="#b8784e"/>
  <ellipse cx="62" cy="108" rx="4" ry="7" fill="#c4855a"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="108" rx="7" ry="10" fill="#b8784e"/>
  <ellipse cx="138" cy="108" rx="4" ry="7" fill="#c4855a"/>
  <!-- Left eye white -->
  <ellipse cx="85" cy="100" rx="8" ry="7" fill="white"/>
  <!-- Left iris -->
  <circle cx="85" cy="101" r="4.5" fill="#3d2010"/>
  <circle cx="85" cy="101" r="2.5" fill="#1a0a00"/>
  <circle cx="86.5" cy="99.5" r="1.2" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="115" cy="100" rx="8" ry="7" fill="white"/>
  <!-- Right iris -->
  <circle cx="115" cy="101" r="4.5" fill="#3d2010"/>
  <circle cx="115" cy="101" r="2.5" fill="#1a0a00"/>
  <circle cx="116.5" cy="99.5" r="1.2" fill="white"/>
  <!-- Left eyelid line -->
  <path d="M 77 98 Q 85 94 93 98" stroke="#1a0a00" stroke-width="1.5" fill="none"/>
  <!-- Right eyelid line -->
  <path d="M 107 98 Q 115 94 123 98" stroke="#1a0a00" stroke-width="1.5" fill="none"/>
  <!-- Left eyebrow -->
  <path d="M 76 90 Q 85 86 94 89" stroke="#1a0a00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right eyebrow -->
  <path d="M 106 89 Q 115 86 124 90" stroke="#1a0a00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose bridge -->
  <path d="M 100 107 L 96 120" stroke="#b37a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 107 L 104 120" stroke="#b37a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <path d="M 93 122 Q 96 125 100 123 Q 104 125 107 122" stroke="#a06840" stroke-width="1.5" fill="none"/>
  <!-- Mouth -->
  <path d="M 88 133 Q 100 142 112 133" stroke="#8a5030" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 89 133 Q 100 138 111 133 Q 100 136 89 133Z" fill="#c0786a" opacity="0.6"/>
</svg>
