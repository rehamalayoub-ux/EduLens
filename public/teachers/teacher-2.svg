<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0b5c42"/>
  <!-- Abaya/body -->
  <path d="M 15 200 C 15 158 50 148 100 152 C 150 148 185 158 185 200Z" fill="#083d2c"/>
  <!-- Hijab outer shape -->
  <path d="M 55 108 C 52 82 58 60 100 58 C 142 60 148 82 145 108 C 148 135 142 158 100 162 C 58 158 52 135 55 108Z" fill="#094d38"/>
  <!-- Hijab shadow/depth at bottom -->
  <path d="M 57 120 C 54 140 58 158 100 162 C 142 158 146 140 143 120 C 138 132 122 144 100 146 C 78 144 62 132 57 120Z" fill="#063328"/>
  <!-- Face oval -->
  <ellipse cx="100" cy="102" rx="33" ry="37" fill="#d4a06a"/>
  <!-- Hijab top highlight -->
  <path d="M 70 70 C 78 60 100 58 100 58 C 100 58 122 60 130 70 C 120 65 100 64 80 70Z" fill="#0d6e50" opacity="0.5"/>
  <!-- Left eye white -->
  <ellipse cx="86" cy="98" rx="7.5" ry="6" fill="white"/>
  <!-- Left iris -->
  <circle cx="86" cy="99" r="4" fill="#2d1a0a"/>
  <circle cx="86" cy="99" r="2.2" fill="#0a0505"/>
  <circle cx="87.5" cy="97.5" r="1" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="114" cy="98" rx="7.5" ry="6" fill="white"/>
  <!-- Right iris -->
  <circle cx="114" cy="99" r="4" fill="#2d1a0a"/>
  <circle cx="114" cy="99" r="2.2" fill="#0a0505"/>
  <circle cx="115.5" cy="97.5" r="1" fill="white"/>
  <!-- Eyelashes top left -->
  <path d="M 78 96 Q 86 91 94 95" stroke="#0a0505" stroke-width="1.8" fill="none"/>
  <!-- Eyelashes top right -->
  <path d="M 106 95 Q 114 91 122 96" stroke="#0a0505" stroke-width="1.8" fill="none"/>
  <!-- Left eyebrow -->
  <path d="M 77 87 Q 86 83 95 86" stroke="#2a1005" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Right eyebrow -->
  <path d="M 105 86 Q 114 83 123 87" stroke="#2a1005" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 100 105 L 97 114" stroke="#be8a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 105 L 103 114" stroke="#be8a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 94 116 Q 100 119 106 116" stroke="#be8a50" stroke-width="1.5" fill="none"/>
  <!-- Mouth -->
  <path d="M 88 126 Q 100 135 112 126" stroke="#9a6040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 90 126 Q 100 131 110 126 Q 100 129 90 126Z" fill="#c87060" opacity="0.55"/>
  <!-- Cheek blush -->
  <ellipse cx="75" cy="112" rx="8" ry="5" fill="#e8806a" opacity="0.2"/>
  <ellipse cx="125" cy="112" rx="8" ry="5" fill="#e8806a" opacity="0.2"/>
</svg>
